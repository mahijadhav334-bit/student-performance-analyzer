{% extends 'base.html' %}

{% block title %}New Announcement{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Create Announcement</h1>
    <p class="page-subtitle">Publish a notice visible to all students on their dashboard.</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('create_announcement') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Announcement title" required maxlength="200">

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="6" placeholder="Write your announcement here..." required></textarea>

        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
            <input type="checkbox" id="is_pinned" name="is_pinned" style="width:auto;">
            <label for="is_pinned" style="margin:0;">Pin this announcement to the top</label>
        </div>

        <button type="submit">Publish Announcement</button>
    </form>
    <a href="{{ url_for('announcements') }}"><button type="button" class="secondary">Cancel</button></a>
</div>
{% endblock %}
