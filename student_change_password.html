{% extends 'base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Change Password</h1>
    <p class="page-subtitle">Update your login password for {{ student.name }}.</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('student_change_password', id=student.id) }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" placeholder="Enter current password" required>

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" placeholder="Minimum 6 characters" required minlength="6">

        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" required minlength="6">

        <button type="submit">Update Password</button>
    </form>
    <a href="{{ url_for('student_dashboard', id=student.id) }}"><button type="button" class="secondary">Back to Dashboard</button></a>
</div>
{% endblock %}
