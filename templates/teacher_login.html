{% extends 'base.html' %}

{% block title %}Teacher Login{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Teacher Login</h1>
    <p class="page-subtitle">Enter your credentials to manage students and analytics.</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('teacher_login') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>
    <a href="{{ url_for('teacher_register') }}"><button type="button" class="secondary">First time? Register here</button></a>
    <a href="{{ url_for('home') }}"><button type="button" class="secondary">Back Home</button></a>
</div>
{% endblock %}
